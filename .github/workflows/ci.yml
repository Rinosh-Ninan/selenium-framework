name: Selenium CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java
        run: |
          java -version

      - name: Verify Maven
        run: |
          mvn -version

      - name: Compile project
        run: |
          mvn clean compile

      - name: Run Tests
        run: mvn clean test -Dheadless=true

      - name: Upload Extent Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: target/extent-report.html

      - name: List project files
        run: |
          ls -la