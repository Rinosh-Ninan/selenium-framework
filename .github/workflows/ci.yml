name: Selenium CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Verify Java
        run: |
          java -version

      - name: Verify Maven
        run: |
          mvn -version

      - name: List project files
        run: |
          ls -la